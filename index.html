<html>

<head>
    <title>Pseudo-classes</title>
    <style>
     /* mouse over link
     a: hover MUST come after a:link and
     a:visited in the CSS definition in
     order to be effective.*/
     a:hover {
         color: purple;
    </style>
</head>

<body>
    <a href="https://www.knightmoves.org/" target="_blank">Knight Moves</a>
    <br><br><br>

    <div>
        Hover over me.
        <p>
            Hidden text that will be displayed
        </p>
    </div>
</body>

</html>
